name: CI

# Se ejecuta en cada push y en cada pull request.
# Runs on every push and every pull request.
on:
  push:
  pull_request:

# Evita ejecuciones duplicadas: cancela la anterior si llega un nuevo push.
# Avoids duplicate runs: cancels the previous one when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Analyze, test & build (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter 3.41.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.3
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Windows (release)
        run: flutter build windows --release
